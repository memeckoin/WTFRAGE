<!DOCTYPE html>

<html lang="en" style="background:#060000 !important;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤬 $WTF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { background:#060000 !important; }

body {
background:#060000 !important;
color:#ffffff !important;
font-family:‘Share Tech Mono’,monospace;
overflow-x:hidden;
min-height:100vh;
}

/* TICKER */
.ticker-wrap {
position:fixed; top:0; left:0; right:0; z-index:9999;
background:#ff1500 !important;
border-bottom:3px solid #ffe000;
height:40px; overflow:hidden;
display:flex; align-items:center;
}

.ticker-track {
display:flex; white-space:nowrap;
animation:ticker 20s linear infinite;
}

@keyframes ticker {
0%   { transform:translateX(0); }
100% { transform:translateX(-50%); }
}

.tick {
display:inline-flex; align-items:center; gap:6px;
padding:0 30px;
font-family:‘Bebas Neue’,sans-serif;
font-size:16px; letter-spacing:2px; color:#fff;
flex-shrink:0;
}
.tick a { color:#ffe000; text-decoration:underline; text-underline-offset:3px; }
.tick .dot { color:#ffe000; }
.tick .dim { opacity:.4; }

/* HERO */
.hero {
background:#060000 !important;
min-height:100vh;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
padding:90px 24px 50px;
position:relative; overflow:hidden;
}

.glow {
position:absolute;
top:35%; left:50%;
transform:translate(-50%,-50%);
width:700px; height:700px;
background:radial-gradient(ellipse, rgba(255,21,0,0.3) 0%, transparent 65%);
pointer-events:none;
animation:breathe 4s ease-in-out infinite;
}

@keyframes breathe {
0%,100%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
50%    { opacity:.55; transform:translate(-50%,-50%) scale(1.25); }
}

.scanlines {
position:absolute; inset:0; pointer-events:none;
background:repeating-linear-gradient(
0deg, transparent 0px, transparent 3px,
rgba(255,21,0,.04) 3px, rgba(255,21,0,.04) 4px
);
}

.big-emoji {
font-size:clamp(100px,22vw,200px); line-height:1;
position:relative; z-index:2;
filter:drop-shadow(0 0 50px rgba(255,30,0,.95)) drop-shadow(0 0 100px rgba(255,80,0,.5));
animation:shake .13s ease-in-out infinite;
cursor:pointer; user-select:none;
}

@keyframes shake {
0%  { transform:rotate(-2.5deg) scale(1.00); }
25% { transform:rotate(2.5deg)  scale(1.02); }
50% { transform:rotate(-1.5deg) scale(.98); }
75% { transform:rotate(3deg)    scale(1.01); }
100%{ transform:rotate(-2.5deg) scale(1.00); }
}

.big-emoji:hover {
animation:freakout .05s ease-in-out infinite;
filter:drop-shadow(0 0 70px rgba(255,100,0,1)) drop-shadow(0 0 130px rgba(255,0,0,.8));
}

@keyframes freakout {
0%  { transform:rotate(-10deg) scale(1.1); }
50% { transform:rotate(10deg)  scale(1.15); }
100%{ transform:rotate(-10deg) scale(1.1); }
}

.coin-name {
font-family:‘Bebas Neue’,sans-serif;
font-size:clamp(80px,22vw,220px); line-height:.9;
color:#ffffff;
text-shadow:
0 0 12px rgba(255,21,0,1),
0 0 40px rgba(255,21,0,.8),
0 0 80px rgba(255,21,0,.4),
5px 5px 0 #ff1500,
6px 6px 0 #990e00;
position:relative; z-index:2;
animation:glitch 7s steps(1) infinite;
}

@keyframes glitch {
0%,94% { clip-path:none; transform:none; }
95%    { clip-path:inset(8% 0 78% 0);  transform:translate(-6px,0); color:#ff6a00; }
96%    { clip-path:inset(55% 0 25% 0); transform:translate(6px,0);  color:#ffe000; }
97%    { clip-path:inset(28% 0 55% 0); transform:translate(-3px,0); color:#ff1500; }
98%,100%{ clip-path:none; transform:none; }
}

.coin-sub {
font-family:‘Bebas Neue’,sans-serif;
font-size:clamp(18px,4vw,38px); letter-spacing:14px;
color:#ffe000;
text-shadow:0 0 20px rgba(255,224,0,.9), 0 0 40px rgba(255,224,0,.4);
position:relative; z-index:2; margin-top:4px;
}

/* CA */
.ca-wrap {
position:relative; z-index:2;
margin-top:40px;
display:flex; flex-direction:column; align-items:center; gap:8px;
}

.ca-label {
font-family:‘Bebas Neue’,sans-serif;
font-size:13px; letter-spacing:7px;
color:#ff1500;
text-shadow:0 0 10px rgba(255,21,0,.6);
}

.ca-row {
display:flex;
border:2px solid #ff1500;
box-shadow:0 0 22px rgba(255,21,0,.4), inset 0 0 18px rgba(255,21,0,.06);
}

.ca-addr {
background:rgba(255,21,0,.08);
padding:13px 20px;
font-family:‘Share Tech Mono’,monospace;
font-size:clamp(10px,2.5vw,14px);
color:#ffffff;
letter-spacing:1px; min-width:155px;
}

.ca-btn {
background:#ff1500 !important;
border:none; padding:13px 22px;
color:#fff !important;
font-family:‘Bebas Neue’,sans-serif;
font-size:16px; letter-spacing:3px;
cursor:pointer; transition:background .15s;
}

.ca-btn:hover  { background:#ff6a00 !important; }
.ca-btn:active { transform:scale(.96); }
.ca-btn.ok     { background:#00b347 !important; }

/* LINKS */
.links {
display:flex; gap:14px;
margin-top:28px;
position:relative; z-index:2;
flex-wrap:wrap; justify-content:center;
}

.lbtn {
display:inline-flex; align-items:center; gap:8px;
padding:11px 24px;
border:2px solid rgba(255,255,255,.18);
background:rgba(255,255,255,.04);
color:#fff;
font-family:‘Bebas Neue’,sans-serif;
font-size:16px; letter-spacing:3px;
text-decoration:none; transition:all .15s;
cursor:pointer;
}

.lbtn:hover {
border-color:#ff1500;
background:rgba(255,21,0,.15);
color:#ffe000;
box-shadow:0 0 18px rgba(255,21,0,.4);
}

.lbtn.soon { opacity:.28; pointer-events:none; }

/* DIVIDER */
.fireline {
width:100%; height:4px;
background:linear-gradient(90deg,transparent,#ff1500 20%,#ff6a00 50%,#ffe000 70%,#ff1500 90%,transparent);
box-shadow:0 0 24px rgba(255,100,0,.7);
}

/* RAGE BOARD */
.rage-section {
background:#060000 !important;
padding:64px 20px 80px;
max-width:740px; margin:0 auto;
}

.rage-title {
font-family:‘Bebas Neue’,sans-serif;
font-size:clamp(60px,14vw,110px); line-height:1;
text-align:center; color:#fff;
text-shadow:4px 4px 0 #ff1500, 0 0 30px rgba(255,21,0,.7), 0 0 60px rgba(255,21,0,.3);
margin-bottom:4px;
}

.rage-sub {
text-align:center; font-size:11px;
letter-spacing:5px; color:#ffffff;
text-transform:uppercase; margin-bottom:38px;
}

.input-box {
background:rgba(255,21,0,.07) !important;
border:2px solid rgba(255,21,0,.4);
padding:22px 22px 16px;
position:relative; margin-bottom:26px;
box-shadow:0 0 30px rgba(255,21,0,.1);
}

.input-box::before {
content:‘🤬’;
position:absolute; top:-16px; left:18px;
font-size:26px; padding:0 6px;
background:#060000; line-height:1;
}

.rage-ta {
width:100%;
background:transparent !important;
border:none;
border-bottom:1px solid rgba(255,21,0,.3);
color:#fff !important;
font-family:‘Share Tech Mono’,monospace;
font-size:14px; line-height:1.6;
resize:none; outline:none;
padding:6px 4px 10px; min-height:70px;
}

.rage-ta::placeholder { color:rgba(255,255,255,.45); }

.input-foot {
display:flex; justify-content:space-between;
align-items:center; margin-top:14px;
flex-wrap:wrap; gap:10px;
}

.ccount { font-size:11px; color:#ffffff; letter-spacing:2px; }
.ccount.hot { color:#ff1500; }

.post-btn {
background:#ff1500 !important;
border:none;
color:#fff !important;
font-family:‘Bebas Neue’,sans-serif;
font-size:18px; letter-spacing:3px;
padding:10px 28px; cursor:pointer;
transition:background .15s;
box-shadow:0 0 18px rgba(255,21,0,.5);
}

.post-btn:hover  { background:#ff6a00 !important; }
.post-btn:active { transform:scale(.96); }
.post-btn:disabled { opacity:.22; cursor:not-allowed; box-shadow:none; }

/* POSTS */
.feed { display:flex; flex-direction:column; gap:10px; }

.post {
background:rgba(255,21,0,.06) !important;
border-left:3px solid #ff1500;
padding:14px 18px;
animation:slidein .25s ease-out;
transition:background .15s;
}

.post:hover { background:rgba(255,21,0,.12) !important; }

@keyframes slidein {
from { opacity:0; transform:translateX(-14px); }
to   { opacity:1; transform:translateX(0); }
}

.post-head { display:flex; justify-content:space-between; margin-bottom:7px; }
.post-user { font-family:‘Bebas Neue’,sans-serif; font-size:13px; letter-spacing:3px; color:#ff6a00; }
.post-time  { font-size:11px; color:#ffffff; letter-spacing:1px; }
.post-body  { font-size:14px; color:#ffffff; line-height:1.6; word-break:break-word; }
.post-foot  { margin-top:10px; }

.react-btn {
background:transparent;
border:1px solid rgba(255,21,0,.25);
color:#ffffff;
font-family:‘Share Tech Mono’,monospace;
font-size:12px; padding:3px 12px;
cursor:pointer; letter-spacing:1px;
transition:all .15s;
}

.react-btn:hover,.react-btn.on {
border-color:#ff1500; color:#fff;
background:rgba(255,21,0,.15);
box-shadow:0 0 8px rgba(255,21,0,.3);
}

.empty {
text-align:center; padding:50px 20px;
color:#ffffff; font-size:12px;
letter-spacing:4px; text-transform:uppercase;
border:1px dashed rgba(255,21,0,.2);
}

footer {
background:#060000 !important;
text-align:center; padding:28px 20px 48px;
font-size:11px; color:rgba(255,255,255,.55);
letter-spacing:3px; text-transform:uppercase;
border-top:1px solid rgba(255,21,0,.12);
}

::-webkit-scrollbar       { width:4px; }
::-webkit-scrollbar-track { background:#060000; }
::-webkit-scrollbar-thumb { background:#ff1500; }

@media(max-width:440px){
.ca-addr { padding:13px 10px; font-size:9px; min-width:90px; }
}
</style>

</head>
<body>

<div class="ticker-wrap"><div class="ticker-track" id="track"></div></div>

<section class="hero">
  <div class="glow"></div>
  <div class="scanlines"></div>
  <div class="big-emoji" id="emoji">🤬</div>
  <div class="coin-name">$WTF</div>
  <div class="coin-sub">ON SOLANA</div>

  <div class="ca-wrap">
    <div class="ca-label">CONTRACT ADDRESS</div>
    <div class="ca-row">
      <div class="ca-addr">Coming Soon</div>
      <button class="ca-btn" id="copyBtn" onclick="copyCA()">COPY</button>
    </div>
  </div>

  <div class="links">
    <a class="lbtn" href="https://x.com/wtfrageboard?s=21" target="_blank" rel="noopener">𝕏 TWITTER</a>
    <a class="lbtn" href="https://t.me/WTFplace" target="_blank" rel="noopener">✈ TELEGRAM</a>
    <span class="lbtn soon">📊 DEX SCREENER — SOON</span>
  </div>
</section>

<div class="fireline"></div>

<section class="rage-section">
  <h2 class="rage-title">RAGE BOARD</h2>
  <p class="rage-sub">drop your wtf moment. we feel you.</p>

  <div class="input-box">
    <textarea class="rage-ta" id="ta"
      placeholder="what's got you 🤬 today? rug pull? missed entry? paper hands? LET IT OUT..."
      maxlength="280" oninput="onType()"></textarea>
    <div class="input-foot">
      <span class="ccount" id="cc">0 / 280</span>
      <button class="post-btn" id="postBtn" onclick="doPost()" disabled>🤬 RAGE POST</button>
    </div>
  </div>

  <div class="feed" id="feed">
    <div class="empty"><div style="font-size:44px;margin-bottom:12px;">🤬</div>no rage yet. be the first.</div>
  </div>
</section>

<footer>$WTF &nbsp;·&nbsp; 🤬 &nbsp;·&nbsp; FOR ENTERTAINMENT PURPOSES ONLY &nbsp;·&nbsp; NOT FINANCIAL ADVICE</footer>

<script>
// TICKER
const T=[['🤬 $WTF ON SOLANA',null,false],['𝕏 TWITTER','https://x.com/wtfrageboard?s=21',false],['🤬 $WTF',null,false],
  ['✈ TELEGRAM','https://t.me/WTFplace',false],['🤬 $WTF',null,false],['📊 DEX SCREENER',null,true],
  ['🤬 WTF ARE YOU WAITING FOR',null,false],['BUY $WTF OR STAY MAD',null,false]];

(function(){
  const tr=document.getElementById('track');
  const mk=()=>T.map(([l,h,s])=>{
    const el=document.createElement('span'); el.className='tick';
    const dot='<span class="dot">✦</span>';
    el.innerHTML=h?`${dot}<a href="${h}" target="_blank" rel="noopener">${l}</a>`:
      s?`${dot}<span class="dim">${l} — COMING SOON</span>`:`${dot}${l}`;
    return el;
  });
  mk().forEach(e=>tr.appendChild(e)); mk().forEach(e=>tr.appendChild(e));
})();

// CA
function copyCA(){
  const btn=document.getElementById('copyBtn');
  btn.textContent='SOON™'; btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='COPY';btn.classList.remove('ok');},1200);
}

// RAGE BOARD
const KEY='wtf_rage_v2';
const NS=['ANON_RAGER','WTF_DEGEN','RUGPULL_SURVIVOR','PAPER_HANDS','DIAMOND_HANDS',
  'NGMI_GUY','COPE_MAXI','CHAD_TRADER','DEGEN_MODE','SOL_ENJOYER','PUMP_CHASER',
  'EXIT_LIQUIDITY','FULL_SEND','NGMI_AGAIN','APEING_IN'];

const load=()=>{try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch{return[];}};
const save=p=>{try{localStorage.setItem(KEY,JSON.stringify(p));}catch{}};
const rname=()=>NS[Math.floor(Math.random()*NS.length)];
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function ago(ts){
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<60)return`${d}s ago`;if(d<3600)return`${Math.floor(d/60)}m ago`;
  if(d<86400)return`${Math.floor(d/3600)}h ago`;return`${Math.floor(d/86400)}d ago`;
}

function render(){
  const feed=document.getElementById('feed');
  const posts=load();
  if(!posts.length){
    feed.innerHTML='<div class="empty"><div style="font-size:44px;margin-bottom:12px;">🤬</div>no rage yet. be the first.</div>';
    return;
  }
  feed.innerHTML=posts.slice().reverse().map(p=>`
    <div class="post">
      <div class="post-head"><span class="post-user">${p.user}</span><span class="post-time">${ago(p.ts)}</span></div>
      <div class="post-body">${esc(p.text)}</div>
      <div class="post-foot"><button class="react-btn${p.raged?' on':''}" onclick="rage('${p.id}')">🤬 ${p.count}</button></div>
    </div>`).join('');
}

function onType(){
  const ta=document.getElementById('ta'),cc=document.getElementById('cc'),btn=document.getElementById('postBtn');
  cc.textContent=`${ta.value.length} / 280`;
  cc.classList.toggle('hot',ta.value.length>240);
  btn.disabled=ta.value.trim().length===0;
}

function doPost(){
  const ta=document.getElementById('ta');
  const text=ta.value.trim(); if(!text)return;
  const posts=load();
  posts.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    user:rname(),text,ts:Date.now(),count:0,raged:false});
  save(posts); ta.value=''; onType(); render();
  const e=document.getElementById('emoji');
  e.style.animation='freakout .05s ease-in-out infinite';
  setTimeout(()=>{e.style.animation='';},700);
}

function rage(id){
  const posts=load(),p=posts.find(x=>x.id===id);
  if(!p)return; p.raged=!p.raged; p.count+=p.raged?1:-1;
  save(posts); render();
}

render(); setInterval(render,30000);

let clicks=0,t;
document.getElementById('emoji').addEventListener('click',()=>{
  clicks++; clearTimeout(t); t=setTimeout(()=>{clicks=0;},900);
  if(clicks>=5){
    document.body.style.backgroundColor='#ff0000';
    setTimeout(()=>{document.body.style.backgroundColor='#060000';},180);
    clicks=0;
  }
});
</script>

</body>
</html>
